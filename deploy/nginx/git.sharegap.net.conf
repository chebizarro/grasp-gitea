server {
    listen 80;
    server_name git.sharegap.net;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name git.sharegap.net;

    # TLS cert/key are expected to be managed by your existing nginx setup.
    ssl_certificate /etc/letsencrypt/live/git.sharegap.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/git.sharegap.net/privkey.pem;

    client_max_body_size 1g;

    location / {
        proxy_pass http://gitea:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
